<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA自助下单平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #0B1020 0%, #1a2a4a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            font-size: 3em;
            font-weight: 800;
            letter-spacing: 5px;
            background: linear-gradient(135deg, #00D4FF, #1E5BFF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .logo p { color: #666; margin-top: 5px; }
        .form-group { margin-bottom: 20px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }
        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1e1e1;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1E5BFF;
        }
        .form-group textarea { min-height: 80px; resize: vertical; }
        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #00D4FF, #1E5BFF);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            letter-spacing: 2px;
            transition: opacity 0.3s;
        }
        .submit-btn:hover { opacity: 0.9; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .success {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #d4edda;
            color: #155724;
            border-radius: 10px;
            text-align: center;
        }
        .error {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background: #f8d7da;
            color: #721c24;
            border-radius: 10px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <h1>SCA</h1>
            <p>自助下单平台</p>
        </div>

        <form id="orderForm">
            <div class="form-group">
                <label>姓名 *</label>
                <input type="text" id="name" required placeholder="请输入您的姓名">
            </div>
            <div class="form-group">
                <label>联系电话 *</label>
                <input type="tel" id="phone" required placeholder="请输入手机号码">
            </div>
            <div class="form-group">
                <label>商品名称 *</label>
                <input type="text" id="product" required placeholder="请输入商品名称">
            </div>
            <div class="form-group">
                <label>数量</label>
                <input type="number" id="quantity" min="1" value="1">
            </div>
            <div class="form-group">
                <label>备注</label>
                <textarea id="note" placeholder="其他要求（可不填）"></textarea>
            </div>
            <button type="submit" class="submit-btn" id="submitBtn">
                提交订单
            </button>
        </form>

        <div class="success" id="success">
            ✅ 订单提交成功！我们会尽快联系您。
        </div>
        <div class="error" id="error">
            ❌ 提交失败，请重试。
        </div>
    </div>

    <script>
        // ⚠️ 把这里换成你的部署网址
        const API_URL = 'https://script.google.com/macros/s/AKfycbzaK2IDq5n_7aHkEDAYz-9vlfRVXRMmsoOnLVTnf14c2wJX_fyuPVFfoFDUk52P8ws/exec';

        document.getElementById('orderForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const btn = document.getElementById('submitBtn');
            const success = document.getElementById('success');
            const error = document.getElementById('error');

            success.style.display = 'none';
            error.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '提交中...';

            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                product: document.getElementById('product').value,
                quantity: document.getElementById('quantity').value,
                note: document.getElementById('note').value
            };

            // 用 FormData 格式发送，解决跨域问题
            const formData = new FormData();
            Object.keys(data).forEach(key => formData.append(key, data[key]));

            try {
                const res = await fetch(API_URL, {
                    method: 'POST',
                    body: formData
                });
                const result = await res.json();
                if (result.success) {
                    success.style.display = 'block';
                    this.reset();
                } else {
                    error.style.display = 'block';
                }
            } catch (err) {
                error.style.display = 'block';
            } finally {
                btn.disabled = false;
                btn.textContent = '提交订单';
            }
        });
    </script>
</body>
</html>
