<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCA 自助下单平台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #111;
            border: 1px solid #222;
            border-radius: 24px;
            padding: 50px 40px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 0 60px rgba(0, 200, 255, 0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 40px;
        }

        .header .brand {
            font-size: 2.8em;
            font-weight: 900;
            letter-spacing: 8px;
            color: #fff;
        }

        .header .brand span {
            color: #00c8ff;
        }

        .header .subtitle {
            color: #555;
            font-size: 13px;
            letter-spacing: 3px;
            margin-top: 8px;
            text-transform: uppercase;
        }

        .divider {
            width: 40px;
            height: 2px;
            background: linear-gradient(90deg, #00c8ff, #0066ff);
            margin: 20px auto 0;
            border-radius: 2px;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            color: #888;
            font-size: 12px;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 14px 16px;
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            transition: border-color 0.3s, box-shadow 0.3s;
            outline: none;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder {
            color: #444;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            border-color: #00c8ff;
            box-shadow: 0 0 0 3px rgba(0, 200, 255, 0.08);
        }

        .form-group textarea {
            min-height: 90px;
            resize: vertical;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            margin-top: 10px;
            background: linear-gradient(135deg, #00c8ff, #0066ff);
            color: white;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            letter-spacing: 3px;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
        }

        .submit-btn:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            background: #333;
            color: #666;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            display: none;
            margin-top: 20px;
            padding: 14px 18px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
        }

        .alert-success {
            background: rgba(0, 200, 100, 0.1);
            border: 1px solid rgba(0, 200, 100, 0.3);
            color: #00c864;
        }

        .alert-error {
            background: rgba(255, 60, 60, 0.1);
            border: 1px solid rgba(255, 60, 60, 0.3);
            color: #ff5555;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: #333;
            font-size: 12px;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="header">
            <div class="brand">S<span>C</span>A</div>
            <div class="subtitle">自助下单平台</div>
            <div class="divider"></div>
        </div>

        <form id="orderForm">
            <div class="form-group">
                <label>姓名</label>
                <input type="text" id="name" required placeholder="请输入您的姓名">
            </div>

            <div class="form-group">
                <label>联系电话</label>
                <input type="tel" id="phone" required placeholder="请输入手机号码">
            </div>

            <div class="form-group">
                <label>商品名称</label>
                <input type="text" id="product" required placeholder="请输入商品名称">
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label>数量</label>
                    <input type="number" id="quantity" min="1" value="1">
                </div>
                <div class="form-group">
                    <label>单位</label>
                    <select id="unit">
                        <option value="件">件</option>
                        <option value="箱">箱</option>
                        <option value="包">包</option>
                        <option value="套">套</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label>备注</label>
                <textarea id="note" placeholder="其他要求（可不填）"></textarea>
            </div>

            <button type="submit" class="submit-btn" id="submitBtn">提交订单</button>
        </form>

        <div class="alert alert-success" id="success">
            ✅ 订单提交成功！我们会尽快联系您。
        </div>
        <div class="alert alert-error" id="error">
            ❌ 提交失败，请检查网络后重试。
        </div>

        <div class="footer">© 2025 SCA STUDIO · All Rights Reserved</div>
    </div>

    <script>
        var API_URL = 'https://script.google.com/macros/s/AKfycbzPUd6wn3AmXbAwFvEGOFf0gxx4-amsRhY0_-JmYGmNOykWCnstAAXDFmldXg5ENL4/exec';

        document.getElementById('orderForm').addEventListener('submit', function(e) {
            e.preventDefault();

            var btn = document.getElementById('submitBtn');
            var success = document.getElementById('success');
            var error = document.getElementById('error');

            success.style.display = 'none';
            error.style.display = 'none';
            btn.disabled = true;
            btn.textContent = '提交中...';

            var name     = document.getElementById('name').value;
            var phone    = document.getElementById('phone').value;
            var product  = document.getElementById('product').value;
            var quantity = document.getElementById('quantity').value;
            var unit     = document.getElementById('unit').value;
            var note     = document.getElementById('note').value;

            var fullURL = API_URL
                + '?name='     + encodeURIComponent(name)
                + '&phone='    + encodeURIComponent(phone)
                + '&product='  + encodeURIComponent(product)
                + '&quantity=' + encodeURIComponent(quantity)
                + '&unit='     + encodeURIComponent(unit)
                + '&note='     + encodeURIComponent(note);

            fetch(fullURL, {
                method: 'GET',
                mode: 'no-cors'
            }).then(function() {
                success.style.display = 'block';
                document.getElementById('orderForm').reset();
                btn.disabled = false;
                btn.textContent = '提交订单';
            }).catch(function() {
                error.style.display = 'block';
                btn.disabled = false;
                btn.textContent = '提交订单';
            });
        });
    </script>

</body>
</html>
